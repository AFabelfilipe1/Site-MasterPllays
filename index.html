<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MasterPllays</title>
    <style>
      body { 
        font-family: Arial, sans-serif; 
        text-align: center; 
        padding: 50px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }
      .message { 
        max-width: 600px; 
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      }
      h1 { 
        color: #333;
        font-size: 2.5em;
        margin-bottom: 20px;
      }
      .game-image {
        width: 100%;
        max-width: 400px;
        height: auto;
        border-radius: 15px;
        margin: 20px 0;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        transition: transform 0.3s ease;
      }
      .game-image:hover {
        transform: scale(1.05);
      }
      p { 
        color: #666; 
        line-height: 1.6;
        font-size: 1.1em;
      }
      a { 
        color: #007bff; 
        text-decoration: none;
        font-weight: bold;
        transition: color 0.3s ease;
      }
      a:hover { 
        color: #0056b3;
        text-decoration: underline;
      }
      .loading-text {
        color: #764ba2;
        font-weight: bold;
        margin-top: 20px;
      }
    </style>
    <!-- Single Page Apps for GitHub Pages - Versão oficial -->
    <!-- MIT License - https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
      
      var validRoutes = ['videos', 'auth', 'planos', 'pagamento', 'profile', 'test', 'games'];
      var pathParts = window.location.pathname.split('/').filter(function(p) { return p; });
      var currentRoute = pathParts[pathParts.length - 1] || '';
      
      if (validRoutes.indexOf(currentRoute) === -1 && 
          window.location.pathname !== '/' && 
          window.location.pathname !== '/index.html' &&
          window.location.pathname !== '/Novo-Site-MasterPllays/') {
        window.location.href = '/Novo-Site-MasterPllays/';
      }
    </script>
    <script type="text/javascript">
      (function() {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        var newUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash;
        
        if (newUrl !== l.href) {
          l.replace(newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div class="message">
      <h1>🎮 MasterPllays</h1>
      
      <!-- Imagem de Games substituindo o vídeo -->
      <img 
        src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80" 
        alt="Games Setup" 
        class="game-image"
        onerror="this.onerror=null; this.src='https://via.placeholder.com/600x400/764ba2/ffffff?text=MasterPllays+Games'"
      >
      
      <p>Bem-vindo ao MasterPllays - Sua plataforma de games!</p>
      <p class="loading-text">Carregando aplicação...</p>
      <p>Se você não for redirecionado automaticamente em alguns segundos, <a href="/Novo-Site-MasterPllays/">clique aqui</a>.</p>
    </div>
    
    <noscript>
      <div class="message">
        <p>JavaScript está desabilitado no seu navegador.</p>
        <p>Por favor, <a href="/Novo-Site-MasterPllays/">clique aqui</a> para acessar o MasterPllays.</p>
      </div>
    </noscript>
  </body>
</html>
