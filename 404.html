<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MasterPllays</title>
    <script type="text/javascript">
      // Redirecionamento automático para a página inicial
      // Se não for uma rota da SPA, redireciona para a home
      var currentPath = window.location.pathname;
      var isSpaRoute = /^\/(videos|auth|planos|pagamento|profile|test)/.test(currentPath);

      if (!isSpaRoute && currentPath !== '/' && currentPath !== '/index.html' && currentPath !== '/Novo-Site-MasterPllays/') {
        // Redireciona para a página inicial considerando o caminho do repositório
        window.location.href = '/Novo-Site-MasterPllays/';
      } else {
        // Single Page Apps for GitHub Pages
        // https://github.com/rafgraph/spa-github-pages
        (function(l) {
          if (l.search[1] === '/' ) {
            var decoded = l.search.slice(1).split('&').map(function(s) {
              return s.replace(/~and~/g, '&')
            }).join('?');
            window.history.replaceState(null, null,
                l.pathname.slice(0, -1) + decoded + l.hash
            );
          }
        }(window.location))
      }
    </script>
    <script type="text/javascript">
      // Redirect to the correct repository path
      var pathSegmentsToKeep = 1; // Mantém 1 segmento (/Novo-Site-MasterPllays)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <!-- Mensagem opcional para usuários com JavaScript desabilitado -->
    <noscript>
      <p style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        Por favor, <a href="/Novo-Site-MasterPllays/">clique aqui</a> para acessar o MasterPllays.
      </p>
    </noscript>
  </body>
</html>
